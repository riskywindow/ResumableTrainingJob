apiVersion: training.checkpoint.example.io/v1alpha1
kind: ResumableTrainingJob
metadata:
  name: ddp-counter-full
  namespace: default
  labels:
    app.kubernetes.io/part-of: checkpoint-native-preemption-controller
spec:
  queueName: training
  workloadPriorityClassName: phase1-high
  identity:
    image: ghcr.io/example/pytorch-ddp-counter:phase1
    codeVersion: git:phase1
    worldSize: 4
    gpuShape: cpu
  runtime:
    mode: DDP
    optimizerMode: adamw
    shardingMode: none
    template:
      apiVersion: jobset.x-k8s.io/v1alpha2
      kind: JobSet
      metadata:
        labels:
          app.kubernetes.io/name: ddp-counter
          app.kubernetes.io/component: trainer
      spec:
        replicatedJobs:
          - name: trainer
            replicas: 1
            template:
              spec:
                parallelism: 1
                completions: 1
                backoffLimit: 0
                template:
                  metadata:
                    labels:
                      app.kubernetes.io/name: ddp-counter
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: trainer
                        image: ghcr.io/example/pytorch-ddp-counter:phase1
                        command:
                          - torchrun
                          - --standalone
                          - --nproc-per-node=4
                          - train.py
                        env:
                          - name: YIELD_SDK_CLUSTER_IDENTITY
                            value: checkpoint-dev
                        resources:
                          requests:
                            cpu: "2"
                            memory: 4Gi
  checkpoint:
    storageURI: s3://phase1-checkpoints/ddp-counter-full/
    interval: 300s
    freshnessBudget: 900s
    maxDrainTime: 900s
    safePointMode: StepBoundary
  resume:
    sourcePolicy: LatestCompatibleComplete
    maxResumeRetries: 3
  control:
    desiredState: Running
