apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    app.kubernetes.io/name: checkpoint-native-preemption-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkpoint-native-preemption-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkpoint-native-preemption-controller
    spec:
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: controller:latest
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --leader-elect
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: healthz
            - containerPort: 9443
              name: webhook-server
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
