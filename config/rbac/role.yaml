apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: checkpoint-native-preemption-controller-manager-role
rules:
  - apiGroups:
      - training.checkpoint.example.io
    resources:
      - resumabletrainingjobs
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - training.checkpoint.example.io
    resources:
      - resumabletrainingjobs/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - training.checkpoint.example.io
    resources:
      - resumabletrainingjobs/finalizers
    verbs:
      - update
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - jobset.x-k8s.io
    resources:
      - jobsets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - scheduling.k8s.io
    resources:
      - priorityclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - workloads
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - workloads/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - workloads/finalizers
    verbs:
      - update
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - resourceflavors
      - workloadpriorityclasses
    verbs:
      - get
      - list
      - watch
  # Phase 4: ResumeReadiness AdmissionCheck controller
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - admissionchecks
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - admissionchecks/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - training.checkpoint.example.io
    resources:
      - resumereadinesspolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - training.checkpoint.example.io
    resources:
      - resumereadinesspolicies/status
    verbs:
      - get
      - update
      - patch
  # Phase 5: CheckpointPriorityPolicy
  - apiGroups:
      - training.checkpoint.example.io
    resources:
      - checkpointprioritypolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - training.checkpoint.example.io
    resources:
      - checkpointprioritypolicies/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
