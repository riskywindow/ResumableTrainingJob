apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resumabletrainingjobs.training.checkpoint.example.io
spec:
  group: training.checkpoint.example.io
  names:
    kind: ResumableTrainingJob
    listKind: ResumableTrainingJobList
    plural: resumabletrainingjobs
    singular: resumabletrainingjob
    shortNames:
      - rtj
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Desired
          type: string
          jsonPath: .spec.control.desiredState
        - name: Suspended
          type: boolean
          jsonPath: .spec.suspend
        - name: Queue
          type: string
          jsonPath: .spec.queueName
        - name: Attempt
          type: integer
          jsonPath: .status.currentRunAttempt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - queueName
                - workloadPriorityClassName
                - identity
                - runtime
                - checkpoint
                - resume
              properties:
                suspend:
                  type: boolean
                queueName:
                  type: string
                  minLength: 1
                workloadPriorityClassName:
                  type: string
                  minLength: 1
                identity:
                  type: object
                  required:
                    - image
                    - codeVersion
                    - worldSize
                    - gpuShape
                  properties:
                    image:
                      type: string
                      minLength: 1
                    codeVersion:
                      type: string
                      minLength: 1
                    worldSize:
                      type: integer
                      format: int32
                      minimum: 1
                    gpuShape:
                      type: string
                      minLength: 1
                runtime:
                  type: object
                  required:
                    - mode
                    - optimizerMode
                    - shardingMode
                    - template
                  properties:
                    mode:
                      type: string
                      enum:
                        - DDP
                        - FSDP
                    optimizerMode:
                      type: string
                      minLength: 1
                    shardingMode:
                      type: string
                      minLength: 1
                    template:
                      type: object
                      required:
                        - spec
                      properties:
                        apiVersion:
                          type: string
                        kind:
                          type: string
                          enum:
                            - JobSet
                        metadata:
                          type: object
                          properties:
                            labels:
                              type: object
                              additionalProperties:
                                type: string
                            annotations:
                              type: object
                              additionalProperties:
                                type: string
                        spec:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                checkpoint:
                  type: object
                  required:
                    - storageURI
                    - interval
                    - freshnessBudget
                    - maxDrainTime
                  properties:
                    storageURI:
                      type: string
                      minLength: 1
                    interval:
                      type: string
                    freshnessBudget:
                      type: string
                    maxDrainTime:
                      type: string
                    safePointMode:
                      type: string
                      enum:
                        - StepBoundary
                resume:
                  type: object
                  required:
                    - maxResumeRetries
                  properties:
                    sourcePolicy:
                      type: string
                      enum:
                        - LatestCompatibleComplete
                    maxResumeRetries:
                      type: integer
                      format: int32
                      minimum: 1
                    allowWorldSizeChange:
                      description: >-
                        Permits resuming from a checkpoint saved at a different
                        world size. Requires PyTorch DCP resharding.
                      type: boolean
                # Phase 3: parallelism
                parallelism:
                  description: >-
                    Configures scalable worker group and partial admission.
                    When absent, worker count derives from identity.worldSize.
                  type: object
                  properties:
                    preferredCount:
                      type: integer
                      format: int32
                      minimum: 1
                    minCount:
                      type: integer
                      format: int32
                      minimum: 1
                    podSetName:
                      type: string
                    enablePartialAdmission:
                      type: boolean
                # Phase 4: topology
                topology:
                  description: >-
                    Declares topology placement requirements. When absent or
                    mode is Disabled, topology-aware scheduling is off
                    (Phase 3 behavior preserved).
                  type: object
                  required:
                    - mode
                  properties:
                    mode:
                      description: >-
                        Topology placement mode for the worker pod set.
                      type: string
                      enum:
                        - Disabled
                        - Required
                        - Preferred
                        - Unconstrained
                    topologyLevel:
                      description: >-
                        Node label key used as the topology domain.
                        Required when mode is Required or Preferred.
                      type: string
                    leaderWorkerColocation:
                      description: >-
                        Requests leader pod co-location in the same topology
                        domain as workers. Only meaningful when mode is
                        Required, Preferred, or Unconstrained.
                      type: boolean
                # Phase 5: priority policy ref
                priorityPolicyRef:
                  description: >-
                    Optional reference to a cluster-scoped CheckpointPriorityPolicy
                    that configures checkpoint-aware priority shaping. When absent,
                    no priority shaping is applied (Phase 4 behavior preserved).
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      minLength: 1
                control:
                  type: object
                  properties:
                    desiredState:
                      type: string
                      enum:
                        - Running
                        - Paused
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Queued
                    - Admitted
                    - Starting
                    - Running
                    - YieldRequested
                    - Draining
                    - Paused
                    - Restoring
                    - Succeeded
                    - Failed
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - reason
                      - message
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                workloadReference:
                  type: object
                  required:
                    - name
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                      minLength: 1
                    namespace:
                      type: string
                admittedClusterQueue:
                  type: string
                currentSuspension:
                  type: object
                  required:
                    - suspended
                  properties:
                    suspended:
                      type: boolean
                    source:
                      type: string
                      enum:
                        - Kueue
                        - Manual
                        - Unknown
                    reason:
                      type: string
                    message:
                      type: string
                    observedAt:
                      type: string
                      format: date-time
                currentRunAttempt:
                  type: integer
                  format: int32
                pauseRequestID:
                  type: string
                activeJobSetName:
                  type: string
                activeControlConfigMapName:
                  type: string
                selectedCheckpoint:
                  type: object
                  properties:
                    id:
                      type: string
                    storageURI:
                      type: string
                    manifestURI:
                      type: string
                    completionTime:
                      type: string
                      format: date-time
                    sourceRunAttempt:
                      type: integer
                      format: int32
                    compatibilityState:
                      type: string
                      enum:
                        - Compatible
                        - Incompatible
                        - Unknown
                    compatibilityReason:
                      type: string
                    worldSize:
                      description: World size recorded in the checkpoint manifest.
                      type: integer
                      format: int32
                lastCompletedCheckpoint:
                  type: object
                  properties:
                    id:
                      type: string
                    storageURI:
                      type: string
                    manifestURI:
                      type: string
                    completionTime:
                      type: string
                      format: date-time
                    sourceRunAttempt:
                      type: integer
                      format: int32
                    compatibilityState:
                      type: string
                      enum:
                        - Compatible
                        - Incompatible
                        - Unknown
                    compatibilityReason:
                      type: string
                    worldSize:
                      description: World size recorded in the checkpoint manifest.
                      type: integer
                      format: int32
                transitionTimestamps:
                  type: object
                  properties:
                    lastTransitionTime:
                      type: string
                      format: date-time
                    queuedAt:
                      type: string
                      format: date-time
                    admittedAt:
                      type: string
                      format: date-time
                    startingAt:
                      type: string
                      format: date-time
                    runningAt:
                      type: string
                      format: date-time
                    yieldRequestedAt:
                      type: string
                      format: date-time
                    drainingAt:
                      type: string
                      format: date-time
                    lastCheckpointCompletedAt:
                      type: string
                      format: date-time
                    pausedAt:
                      type: string
                      format: date-time
                    restoringAt:
                      type: string
                      format: date-time
                    restoreCompletedAt:
                      type: string
                      format: date-time
                    succeededAt:
                      type: string
                      format: date-time
                    failedAt:
                      type: string
                      format: date-time
                reason:
                  type: string
                message:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                # Phase 3: admission status
                admission:
                  description: Admitted shape from Kueue.
                  type: object
                  properties:
                    admittedWorkerCount:
                      type: integer
                      format: int32
                    preferredWorkerCount:
                      type: integer
                      format: int32
                    activeWorkerCount:
                      type: integer
                      format: int32
                    admittedFlavors:
                      type: object
                      additionalProperties:
                        type: string
                # Phase 3: restore status
                restore:
                  description: Details of the most recent checkpoint restore.
                  type: object
                  properties:
                    lastCheckpointWorldSize:
                      type: integer
                      format: int32
                    lastRestoreWorldSize:
                      type: integer
                      format: int32
                    restoreMode:
                      type: string
                      enum:
                        - SameSize
                        - Reshard
                # Phase 4: launch readiness
                launchReadiness:
                  description: >-
                    Pre-launch readiness state set by the ResumeReadiness
                    AdmissionCheck controller. Nil when readiness gate is not active.
                  type: object
                  required:
                    - ready
                  properties:
                    ready:
                      type: boolean
                    gateState:
                      type: string
                      enum:
                        - Pending
                        - Ready
                        - Rejected
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                # Phase 4: topology status
                topology:
                  description: >-
                    Admitted topology assignment from Kueue TAS.
                    Nil when topology is not enabled or not yet admitted.
                  type: object
                  properties:
                    levels:
                      type: array
                      items:
                        type: string
                    domains:
                      type: array
                      items:
                        type: object
                        properties:
                          values:
                            type: array
                            items:
                              type: string
                          count:
                            type: integer
                            format: int32
                # Phase 4: effective launch shape
                effectiveLaunchShape:
                  description: >-
                    Computed launch shape derived from admission decisions.
                    Nil before first admission.
                  type: object
                  properties:
                    workerCount:
                      type: integer
                      format: int32
                    worldSize:
                      type: integer
                      format: int32
                    resumeMode:
                      type: string
                      enum:
                        - SameSize
                        - Reshard
                    selectedCheckpointID:
                      type: string
                # Phase 5: priority shaping status
                priorityShaping:
                  description: >-
                    Checkpoint-aware priority shaping state. Nil when no
                    CheckpointPriorityPolicy is referenced.
                  type: object
                  properties:
                    basePriority:
                      description: Static priority from the WorkloadPriorityClass.
                      type: integer
                      format: int32
                    effectivePriority:
                      description: Dynamically computed priority written to Workload.Spec.Priority.
                      type: integer
                      format: int32
                    preemptionState:
                      description: Current preemption lifecycle state.
                      type: string
                      enum:
                        - Protected
                        - Active
                        - Cooldown
                        - Preemptible
                    preemptionStateReason:
                      description: Machine-readable reason for the current preemption state.
                      type: string
                    protectedUntil:
                      description: Timestamp until which the startup protection window is active.
                      type: string
                      format: date-time
                    lastCompletedCheckpointTime:
                      description: Completion timestamp of the most recent checkpoint.
                      type: string
                      format: date-time
                    checkpointAge:
                      description: Age of the most recent checkpoint as a duration string.
                      type: string
                    lastYieldTime:
                      description: Timestamp of the most recent yield (preemption).
                      type: string
                      format: date-time
                    lastResumeTime:
                      description: Timestamp of the most recent resume.
                      type: string
                      format: date-time
                    recentYieldCount:
                      description: Number of yields within the policy's yieldWindow.
                      type: integer
                      format: int32
                    appliedPolicyRef:
                      description: Name of the CheckpointPriorityPolicy last used to compute effective priority.
                      type: string
