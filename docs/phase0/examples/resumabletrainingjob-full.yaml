apiVersion: training.checkpoint.example.io/v1alpha1
kind: ResumableTrainingJob
metadata:
  name: mixtral-fsdp-prod
  namespace: ml-jobs
  labels:
    phase0.example: "true"
    workload.class: "training"
  annotations:
    phase0.note: "Conceptual example only; not a finalized Kubernetes API contract."
spec:
  queueName: prod-gpu
  workloadPriorityClassName: research-high
  identity:
    image: registry.example.com/training/mixtral:sha256-a4c1d9e0
    codeVersion: git:a4c1d9e0
    worldSize: 16
    gpuShape: nvidia-h100-80gb
  runtime:
    mode: FSDP
    optimizerMode: adamw
    shardingMode: fsdp-full-shard
    template:
      apiVersion: jobset.x-k8s.io/v1alpha2
      kind: JobSet
      metadata:
        labels:
          app.kubernetes.io/name: mixtral-fsdp
      spec:
        replicatedJobs:
          - name: trainer
            replicas: 16
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: trainer
                    image: registry.example.com/training/mixtral:sha256-a4c1d9e0
  checkpoint:
    storageURI: s3://ml-checkpoints/mixtral-fsdp-prod/
    interval: 600s
    freshnessBudget: 1200s
    maxDrainTime: 900s
    safePointMode: StepBoundary
  resume:
    sourcePolicy: LatestCompatibleComplete
    maxResumeRetries: 5
  control:
    desiredState: Running
status:
  phase: Restoring
  observedGeneration: 4
  conditions:
