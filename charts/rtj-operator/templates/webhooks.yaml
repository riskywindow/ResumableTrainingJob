apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "rtj-operator.fullname" . }}-mutating
  labels:
    {{- include "rtj-operator.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ include "rtj-operator.namespace" . }}/{{ include "rtj-operator.webhookCertName" . }}
  {{- end }}
webhooks:
  - name: mresumabletrainingjob.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "rtj-operator.webhookServiceName" . }}
        namespace: {{ include "rtj-operator.namespace" . }}
        path: /mutate-training-checkpoint-example-io-v1alpha1-resumabletrainingjob
    failurePolicy: Fail
    matchPolicy: Equivalent
    rules:
      - apiGroups:
          - training.checkpoint.example.io
        apiVersions:
          - v1alpha1
          - v1beta1
        operations:
          - CREATE
          - UPDATE
        resources:
          - resumabletrainingjobs
    sideEffects: None
  - name: mcheckpointprioritypolicy.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "rtj-operator.webhookServiceName" . }}
        namespace: {{ include "rtj-operator.namespace" . }}
        path: /mutate-training-checkpoint-example-io-v1alpha1-checkpointprioritypolicy
    failurePolicy: Fail
    matchPolicy: Equivalent
    rules:
      - apiGroups:
          - training.checkpoint.example.io
        apiVersions:
          - v1alpha1
          - v1beta1
        operations:
          - CREATE
          - UPDATE
        resources:
          - checkpointprioritypolicies
    sideEffects: None
  - name: mresumerreadinesspolicy.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "rtj-operator.webhookServiceName" . }}
        namespace: {{ include "rtj-operator.namespace" . }}
        path: /mutate-training-checkpoint-example-io-v1alpha1-resumereadinesspolicy
    failurePolicy: Fail
    matchPolicy: Equivalent
    rules:
      - apiGroups:
          - training.checkpoint.example.io
        apiVersions:
          - v1alpha1
          - v1beta1
        operations:
          - CREATE
          - UPDATE
        resources:
          - resumereadinesspolicies
    sideEffects: None
