# Phase 7 LocalQueue with hold policy for failure-path tests.
# Points to the Phase 7 failure ClusterQueue (failed.fake.dev class).
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: __LOCAL_QUEUE_NAME__
  namespace: __DEV_NAMESPACE__
spec:
  clusterQueue: phase7-failure-cq
  stopPolicy: Hold
