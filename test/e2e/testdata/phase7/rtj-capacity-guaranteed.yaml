# Phase 7 e2e: RTJ exercising capacity-guaranteed launch via ProvisioningRequest.
#
# Targets the phase7-training queue which requires the dev-provisioning
# AdmissionCheck (check-capacity.fake.dev class). The fake backend provisions
# capacity after a short configurable delay.
#
# Placeholders:
#   __RTJ_NAME__         -> unique RTJ name
#   __TRAINER_IMAGE__    -> trainer container image
#   __DEV_NAMESPACE__    -> target namespace
apiVersion: training.checkpoint.example.io/v1alpha1
kind: ResumableTrainingJob
metadata:
  name: __RTJ_NAME__
  namespace: __DEV_NAMESPACE__
  labels:
    kueue.x-k8s.io/queue-name: phase7-training
spec:
  suspend: true
  queueName: phase7-training
  control:
    desiredState: Running
  identity:
    worldSize: 2
    image: __TRAINER_IMAGE__
    codeVersion: "1"
    gpuShape: cpu-only
  runtime:
    mode: DDP
    optimizerMode: sgd
    shardingMode: none
    template:
      spec:
        replicatedJobs:
          - name: worker
            replicas: 2
            template:
              spec:
                parallelism: 1
                completions: 1
                backoffLimit: 0
                template:
                  metadata:
                    labels:
                      app.kubernetes.io/name: rtj-phase7-e2e
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: trainer
                        image: __TRAINER_IMAGE__
                        imagePullPolicy: IfNotPresent
                        command:
                          - python
                          - -m
                          - torch.distributed.run
                          - --standalone
                          - --nnodes=1
                          - --nproc-per-node=2
                          - /app/fixtures/pytorch_ddp_counter/train.py
                          - --max-steps
                          - "1000"
                          - --sleep-per-step
                          - "0.2"
                        env:
                          - name: YIELD_SDK_CLUSTER_IDENTITY
                            value: checkpoint-dev
                        envFrom:
                          - secretRef:
                              name: checkpoint-storage-credentials
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
  checkpoint:
    storageURI: s3://rtj-checkpoints/__RTJ_NAME__/
    interval: 300s
    freshnessBudget: 900s
    maxDrainTime: 180s
    safePointMode: StepBoundary
  resume:
    sourcePolicy: LatestCompatibleComplete
    maxResumeRetries: 3
