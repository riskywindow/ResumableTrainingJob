# Phase 7 e2e: RTJ exercising provisioning failure path.
#
# Targets the phase7-failure-training LocalQueue which uses the phase7-failure-cq
# ClusterQueue. That queue requires the dev-provisioning-failure AdmissionCheck
# backed by the failed.fake.dev class (immediate permanent failure).
#
# Placeholders:
#   __RTJ_NAME__         -> unique RTJ name
#   __TRAINER_IMAGE__    -> trainer container image
#   __DEV_NAMESPACE__    -> target namespace
apiVersion: training.checkpoint.example.io/v1alpha1
kind: ResumableTrainingJob
metadata:
  name: __RTJ_NAME__
  namespace: __DEV_NAMESPACE__
  labels:
    kueue.x-k8s.io/queue-name: phase7-failure-training
spec:
  suspend: true
  queueName: phase7-failure-training
  control:
    desiredState: Running
  identity:
    worldSize: 2
    image: __TRAINER_IMAGE__
    codeVersion: "1"
    gpuShape: cpu-only
  runtime:
    mode: DDP
    optimizerMode: sgd
    shardingMode: none
    template:
      spec:
        replicatedJobs:
          - name: worker
            replicas: 2
            template:
              spec:
                parallelism: 1
                completions: 1
                backoffLimit: 0
                template:
                  metadata:
                    labels:
                      app.kubernetes.io/name: rtj-phase7-failure-e2e
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: trainer
                        image: __TRAINER_IMAGE__
                        imagePullPolicy: IfNotPresent
                        env:
                          - name: YIELD_SDK_CONTROL_FILE
                            value: /yield/control/state
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
                        volumeMounts:
                          - name: control
                            mountPath: /yield/control
                    volumes:
                      - name: control
                        emptyDir: {}
  checkpoint:
    storageURI: s3://rtj-checkpoints/__RTJ_NAME__/
    interval: 300s
    freshnessBudget: 900s
    maxDrainTime: 180s
  resume:
    sourcePolicy: LatestCompatibleComplete
    maxResumeRetries: 3
