# Phase 4 e2e: RTJ exercising the ResumeReadiness admission gate (no topology).
#
# Targets the phase4-training queue which has the resume-readiness
# AdmissionCheck. No topology is configured — isolates the admission check path.
#
# On initial launch, the default policy (allowInitialLaunchWithoutCheckpoint=true)
# auto-approves the readiness gate.
#
# Placeholders:
#   __RTJ_NAME__         -> unique RTJ name
#   __TRAINER_IMAGE__    -> trainer container image
#   __DEV_NAMESPACE__    -> target namespace
#   __LOCAL_QUEUE_NAME__ -> local queue name (default: phase4-training)
apiVersion: training.checkpoint.example.io/v1alpha1
kind: ResumableTrainingJob
metadata:
  name: __RTJ_NAME__
  namespace: __DEV_NAMESPACE__
  labels:
    kueue.x-k8s.io/queue-name: __LOCAL_QUEUE_NAME__
    kueue.x-k8s.io/priority-class: phase1-dev
spec:
  suspend: true
  queueName: __LOCAL_QUEUE_NAME__
  workloadPriorityClassName: phase1-dev
  control:
    desiredState: Running
  identity:
    worldSize: 2
    image: __TRAINER_IMAGE__
    codeVersion: "1"
    gpuShape: cpu-only
  runtime:
    mode: DDP
    optimizerMode: sgd
    shardingMode: none
    template:
      spec:
        replicatedJobs:
          - name: worker
            replicas: 2
            template:
              spec:
                parallelism: 1
                completions: 1
                backoffLimit: 0
                template:
                  metadata:
                    labels:
                      app.kubernetes.io/name: rtj-phase4-e2e
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: trainer
                        image: __TRAINER_IMAGE__
                        imagePullPolicy: IfNotPresent
                        command:
                          - python
                          - -m
                          - torch.distributed.run
                          - --standalone
                          - --nnodes=1
                          - --nproc-per-node=2
                          - /app/fixtures/pytorch_ddp_counter/train.py
                          - --max-steps
                          - "1000"
                          - --sleep-per-step
                          - "0.2"
                        env:
                          - name: YIELD_SDK_CLUSTER_IDENTITY
                            value: checkpoint-dev
                        envFrom:
                          - secretRef:
                              name: checkpoint-storage-credentials
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
  checkpoint:
    storageURI: s3://rtj-checkpoints/__RTJ_NAME__/
    interval: 300s
    freshnessBudget: 900s
    maxDrainTime: 180s
    safePointMode: StepBoundary
  resume:
    sourcePolicy: LatestCompatibleComplete
    maxResumeRetries: 3
