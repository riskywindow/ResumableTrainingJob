# RBAC for the MultiKueue remote client on WORKER clusters.
#
# The kubeconfig stored in each MultiKueueCluster Secret must authenticate
# as a principal that has these permissions on the worker cluster. This
# file documents the minimum ClusterRole that should exist on each worker
# cluster and be bound to the identity used in the kubeconfig.
#
# In a production setup, this would typically be:
#   1. A ServiceAccount on the worker cluster
#   2. A kubeconfig with a token for that ServiceAccount
#   3. This ClusterRole bound to that ServiceAccount
#
# For kind-based dev environments, the kubeconfig can use the worker
# cluster's admin credentials (which already have full access).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: multikueue-remote-client
  labels:
    app.kubernetes.io/component: multikueue
    app.kubernetes.io/part-of: checkpoint-native-preemption-controller
rules:
  # Kueue Workload resources -- MultiKueue creates, watches, and manages
  # remote Workloads on the worker cluster.
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["workloads"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["workloads/status"]
    verbs: ["get", "update", "patch"]
  # RTJ resources -- the external-framework adapter creates and manages
  # remote RTJ copies on the worker cluster.
  - apiGroups: ["training.checkpoint.example.io"]
    resources: ["resumabletrainingjobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["training.checkpoint.example.io"]
    resources: ["resumabletrainingjobs/status"]
    verbs: ["get"]
