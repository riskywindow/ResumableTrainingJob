# ClusterRoleBinding that grants the Kueue controller manager ServiceAccount
# the RTJ MultiKueue permissions defined in the ClusterRole.
#
# The subjects.name and subjects.namespace must match the Kueue controller
# manager's ServiceAccount. By default, Kueue Helm chart creates:
#   - ServiceAccount: kueue-controller-manager
#   - Namespace: kueue-system
#
# Adjust these values if your Kueue installation uses a different
# ServiceAccount name or namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kueue-multikueue-rtj-manager
  labels:
    app.kubernetes.io/component: multikueue
    app.kubernetes.io/part-of: checkpoint-native-preemption-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kueue-multikueue-rtj-manager
subjects:
  - kind: ServiceAccount
    name: kueue-controller-manager
    namespace: kueue-system
