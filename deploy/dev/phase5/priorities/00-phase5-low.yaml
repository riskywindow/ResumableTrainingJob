# Phase 5 low base priority class.
#
# Used for RTJs that should be preemptible by higher-priority workloads.
# The value of 100 is intentionally low so that checkpoint-staleness-driven
# priority reduction (via preemptibleOffset) can push the effective priority
# below zero, making the preemption ordering unambiguous.
#
# See also: 01-phase5-high.yaml for the higher-priority counterpart.
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: phase5-low
  labels:
    checkpoint-native.dev/profile: phase5-priority-shaping
value: 100
description: >-
  Low base priority for Phase 5 checkpoint-aware preemption testing.
  RTJs using this class can be demoted below zero by preemptibleOffset.
