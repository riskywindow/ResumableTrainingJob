# Phase 8 sample: Incompatible device profile resume rejection.
#
# This RTJ uses a DIFFERENT DeviceClass ("example-gpu-alt") that does not
# exist in the cluster. It demonstrates the fail-closed device profile
# compatibility check: if a checkpoint was saved with device profile
# fingerprint A and the current RTJ has fingerprint B, resume is rejected.
#
# Usage for testing incompatible profile rejection:
#   1. First run rtj-dra-launch.yaml and let it checkpoint
#   2. Then submit this RTJ with a different device class
#   3. Resume should fail with incompatible device profile
#
# Note: This sample intentionally references a non-existent DeviceClass
# to demonstrate the validation path. For a working incompatible test,
# create a second DeviceClass and submit this after a checkpoint was
# created with the first DeviceClass.
apiVersion: training.checkpoint.example.io/v1alpha1
kind: ResumableTrainingJob
metadata:
  name: __RTJ_NAME__
  namespace: __DEV_NAMESPACE__
  labels:
    kueue.x-k8s.io/queue-name: phase8-training
spec:
  suspend: true
  queueName: phase8-training
  control:
    desiredState: Running
  devices:
    mode: DRA
    claims:
      - name: gpu
        containers:
          - trainer
        request:
          # Different DeviceClass from the launch sample -- produces a
          # different device profile fingerprint, triggering fail-closed
          # rejection when resuming from a checkpoint created with
          # "example-gpu".
          deviceClassName: example-gpu-alt
          count: 2
  identity:
    worldSize: 2
    image: __TRAINER_IMAGE__
    codeVersion: "1"
    gpuShape: example-gpu-alt-v1
  runtime:
    mode: DDP
    optimizerMode: sgd
    shardingMode: none
    template:
      spec:
        replicatedJobs:
          - name: worker
            replicas: 2
            template:
              spec:
                parallelism: 1
                completions: 1
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: trainer
                        image: __TRAINER_IMAGE__
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
                        env:
                          - name: YIELD_SDK_STORAGE_URI
                            value: s3://rtj-checkpoints
                          - name: YIELD_SDK_CONTROL_FILE
                            value: /yield/control/state
                          - name: AWS_ACCESS_KEY_ID
                            value: minioadmin
                          - name: AWS_SECRET_ACCESS_KEY
                            value: minioadmin123
                          - name: AWS_ENDPOINT_URL
                            value: http://minio.checkpoint-dev.svc.cluster.local:9000
                          - name: AWS_DEFAULT_REGION
                            value: us-east-1
                        volumeMounts:
                          - name: control
                            mountPath: /yield/control
                    volumes:
                      - name: control
                        emptyDir: {}
  checkpoint:
    storageURI: s3://rtj-checkpoints
    interval: 15s
    freshnessBudget: 1m
    maxDrainTime: 30s
  resume:
    sourcePolicy: LatestCompatibleComplete
    maxResumeRetries: 3
