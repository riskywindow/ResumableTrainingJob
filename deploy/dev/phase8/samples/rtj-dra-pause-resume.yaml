# Phase 8 sample: DRA-backed RTJ pause/resume with same device profile.
#
# This RTJ uses the same "example-gpu" DeviceClass as the launch sample.
# After pause and resume, the device profile fingerprint matches, so the
# checkpoint is compatible and resume succeeds.
#
# Expected flow:
#   1. Submit RTJ → launches with 2 GPUs per worker
#   2. Patch desiredState=Paused → operator pauses, checkpoint saved
#   3. Patch desiredState=Running → resume selects compatible checkpoint
#   4. Device profile fingerprint matches → launch proceeds
apiVersion: training.checkpoint.example.io/v1alpha1
kind: ResumableTrainingJob
metadata:
  name: __RTJ_NAME__
  namespace: __DEV_NAMESPACE__
  labels:
    kueue.x-k8s.io/queue-name: phase8-training
spec:
  suspend: true
  queueName: phase8-training
  control:
    desiredState: Running
  devices:
    mode: DRA
    claims:
      - name: gpu
        containers:
          - trainer
        request:
          deviceClassName: example-gpu
          count: 2
          selectors:
            - "device.attributes[\"memory\"].compareTo(quantity(\"80Gi\")) >= 0"
  identity:
    worldSize: 2
    image: __TRAINER_IMAGE__
    codeVersion: "1"
    gpuShape: example-gpu-v1
  runtime:
    mode: DDP
    optimizerMode: sgd
    shardingMode: none
    template:
      spec:
        replicatedJobs:
          - name: worker
            replicas: 2
            template:
              spec:
                parallelism: 1
                completions: 1
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: trainer
                        image: __TRAINER_IMAGE__
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
                        env:
                          - name: YIELD_SDK_STORAGE_URI
                            value: s3://rtj-checkpoints
                          - name: YIELD_SDK_CONTROL_FILE
                            value: /yield/control/state
                          - name: AWS_ACCESS_KEY_ID
                            value: minioadmin
                          - name: AWS_SECRET_ACCESS_KEY
                            value: minioadmin123
                          - name: AWS_ENDPOINT_URL
                            value: http://minio.checkpoint-dev.svc.cluster.local:9000
                          - name: AWS_DEFAULT_REGION
                            value: us-east-1
                          - name: SLEEP_PER_STEP
                            value: "5"
                          - name: CHECKPOINT_EVERY
                            value: "3"
                          - name: TOTAL_STEPS
                            value: "100"
                        volumeMounts:
                          - name: control
                            mountPath: /yield/control
                    volumes:
                      - name: control
                        emptyDir: {}
  checkpoint:
    storageURI: s3://rtj-checkpoints
    interval: 15s
    freshnessBudget: 1m
    maxDrainTime: 30s
  resume:
    sourcePolicy: LatestCompatibleComplete
    maxResumeRetries: 3
