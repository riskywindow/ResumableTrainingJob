# Phase 4 namespace label update.
#
# Applies Phase 4 label to the existing checkpoint-dev namespace.
# The kueue-managed label is already set in 00-checkpoint-dev.yaml.
apiVersion: v1
kind: Namespace
metadata:
  name: checkpoint-dev
  labels:
    checkpoint-native.dev/enabled: "true"
    checkpoint-native.dev/phase: "phase4"
    checkpoint-native.dev/kueue-managed: "true"
