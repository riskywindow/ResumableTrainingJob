apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: standalone-jobset-smoke
  namespace: checkpoint-dev
  labels:
    kueue.x-k8s.io/queue-name: training
    kueue.x-k8s.io/priority-class: phase1-dev
spec:
  replicatedJobs:
    - name: driver
      replicas: 1
      template:
        spec:
          parallelism: 1
          completions: 1
          backoffLimit: 0
          template:
            metadata:
              labels:
                app.kubernetes.io/name: standalone-jobset-smoke
                app.kubernetes.io/component: driver
            spec:
              restartPolicy: Never
              containers:
                - name: sleep
                  image: busybox:1.36.1
                  command:
                    - /bin/sh
                    - -c
                    - sleep 180
                  resources:
                    requests:
                      cpu: 100m
                      memory: 128Mi
    - name: worker
      replicas: 1
      template:
        spec:
          parallelism: 1
          completions: 1
          backoffLimit: 0
          template:
            metadata:
              labels:
                app.kubernetes.io/name: standalone-jobset-smoke
                app.kubernetes.io/component: worker
            spec:
              restartPolicy: Never
              containers:
                - name: sleep
                  image: busybox:1.36.1
                  command:
                    - /bin/sh
                    - -c
                    - sleep 180
                  resources:
                    requests:
                      cpu: 100m
                      memory: 128Mi
