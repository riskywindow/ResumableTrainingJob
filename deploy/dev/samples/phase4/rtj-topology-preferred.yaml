# Phase 4 sample: RTJ with topology Preferred at rack level.
#
# Kueue TAS will try to place all worker pods in the same rack domain.
# If rack-level placement is not possible (not enough capacity), Kueue
# will spread pods across racks in a best-effort manner.
#
# In the dev kind cluster:
#   rack-1 (block-a): worker, worker2   — 2 pods fit here
#   rack-2 (block-b): worker3, worker4  — 2 pods fit here
#
# With 2 replicas and Preferred mode, Kueue should pack both into one rack.
#
# Placeholders:
#   __RTJ_NAME__       -> RTJ name
#   __TRAINER_IMAGE__  -> trainer container image
#   __DEV_NAMESPACE__  -> target namespace
apiVersion: training.checkpoint.example.io/v1alpha1
kind: ResumableTrainingJob
metadata:
  name: __RTJ_NAME__
  namespace: __DEV_NAMESPACE__
  labels:
    kueue.x-k8s.io/queue-name: phase4-training
    kueue.x-k8s.io/priority-class: phase1-dev
spec:
  suspend: true
  queueName: phase4-training
  workloadPriorityClassName: phase1-dev
  control:
    desiredState: Running
  topology:
    mode: Preferred
    topologyLevel: topology.example.io/rack
  identity:
    worldSize: 2
    image: __TRAINER_IMAGE__
    codeVersion: "1"
    gpuShape: cpu-only
  runtime:
    mode: DDP
    optimizerMode: sgd
    shardingMode: none
    template:
      spec:
        replicatedJobs:
          - name: worker
            replicas: 2
            template:
              spec:
                parallelism: 1
                completions: 1
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: trainer
                        image: __TRAINER_IMAGE__
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
                        env:
                          - name: YIELD_SDK_STORAGE_URI
                            value: s3://rtj-checkpoints
                          - name: YIELD_SDK_CONTROL_FILE
                            value: /yield/control/state
                          - name: AWS_ACCESS_KEY_ID
                            value: minioadmin
                          - name: AWS_SECRET_ACCESS_KEY
                            value: minioadmin123
                          - name: AWS_ENDPOINT_URL
                            value: http://minio.checkpoint-dev.svc.cluster.local:9000
                          - name: AWS_DEFAULT_REGION
                            value: us-east-1
                        volumeMounts:
                          - name: control
                            mountPath: /yield/control
                    volumes:
                      - name: control
                        emptyDir: {}
  checkpoint:
    storageURI: s3://rtj-checkpoints
    interval: 30s
    freshnessBudget: 2m
    maxDrainTime: 60s
  resume:
    sourcePolicy: LatestCompatibleComplete
    maxResumeRetries: 3
