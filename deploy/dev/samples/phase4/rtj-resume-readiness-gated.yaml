# Phase 4 sample: RTJ exercising the ResumeReadiness admission gate.
#
# This RTJ targets the phase4-training queue which has the resume-readiness
# AdmissionCheck configured. The admission pipeline:
#   1. Kueue creates a Workload and begins admission.
#   2. ResumeReadiness controller evaluates checkpoint readiness.
#   3. On initial launch (no prior checkpoint), the default policy
#      (allowInitialLaunchWithoutCheckpoint=true) auto-approves.
#   4. On resume after preemption, the controller checks for a valid
#      checkpoint before approving.
#
# No topology is configured — this sample isolates the admission check path.
# Combine with topology fields from the topology samples to test both features.
#
# Placeholders:
#   __RTJ_NAME__       -> RTJ name
#   __TRAINER_IMAGE__  -> trainer container image
#   __DEV_NAMESPACE__  -> target namespace
apiVersion: training.checkpoint.example.io/v1alpha1
kind: ResumableTrainingJob
metadata:
  name: __RTJ_NAME__
  namespace: __DEV_NAMESPACE__
  labels:
    kueue.x-k8s.io/queue-name: phase4-training
    kueue.x-k8s.io/priority-class: phase1-dev
spec:
  suspend: true
  queueName: phase4-training
  workloadPriorityClassName: phase1-dev
  control:
    desiredState: Running
  identity:
    worldSize: 2
    image: __TRAINER_IMAGE__
    codeVersion: "1"
    gpuShape: cpu-only
  runtime:
    mode: DDP
    optimizerMode: sgd
    shardingMode: none
    template:
      spec:
        replicatedJobs:
          - name: worker
            replicas: 2
            template:
              spec:
                parallelism: 1
                completions: 1
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: trainer
                        image: __TRAINER_IMAGE__
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
                        env:
                          - name: YIELD_SDK_STORAGE_URI
                            value: s3://rtj-checkpoints
                          - name: YIELD_SDK_CONTROL_FILE
                            value: /yield/control/state
                          - name: AWS_ACCESS_KEY_ID
                            value: minioadmin
                          - name: AWS_SECRET_ACCESS_KEY
                            value: minioadmin123
                          - name: AWS_ENDPOINT_URL
                            value: http://minio.checkpoint-dev.svc.cluster.local:9000
                          - name: AWS_DEFAULT_REGION
                            value: us-east-1
                        volumeMounts:
                          - name: control
                            mountPath: /yield/control
                    volumes:
                      - name: control
                        emptyDir: {}
  checkpoint:
    storageURI: s3://rtj-checkpoints
    interval: 30s
    freshnessBudget: 2m
    maxDrainTime: 60s
  resume:
    sourcePolicy: LatestCompatibleComplete
    maxResumeRetries: 3
