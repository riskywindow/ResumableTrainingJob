# Phase 4 smoke test: standalone JobSet on topology-aware queue.
#
# This JobSet is Kueue-managed (has queue-name label) and exercises the
# Phase 4 topology-aware ClusterQueue. It verifies that:
#   1. Kueue admits the workload through the Phase 4 queue.
#   2. The ResumeReadiness admission check is processed (auto-approved for
#      non-RTJ workloads or skipped if not applicable).
#   3. Pods land on topology-labeled nodes.
#   4. The dev environment topology, flavors, and queues are correctly configured.
#
# This is a quick infrastructure validation, not an RTJ test.
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: phase4-topology-smoke
  namespace: checkpoint-dev
  labels:
    kueue.x-k8s.io/queue-name: phase4-training
    kueue.x-k8s.io/priority-class: phase1-dev
spec:
  replicatedJobs:
    - name: worker
      replicas: 2
      template:
        spec:
          parallelism: 1
          completions: 1
          backoffLimit: 0
          template:
            metadata:
              labels:
                app.kubernetes.io/name: phase4-topology-smoke
                app.kubernetes.io/component: worker
            spec:
              restartPolicy: Never
              containers:
                - name: sleep
                  image: busybox:1.36.1
                  command:
                    - /bin/sh
                    - -c
                    - |
                      echo "node=$(hostname)"
                      echo "block=${TOPOLOGY_BLOCK:-unknown}"
                      echo "rack=${TOPOLOGY_RACK:-unknown}"
                      sleep 120
                  resources:
                    requests:
                      cpu: 100m
                      memory: 128Mi
