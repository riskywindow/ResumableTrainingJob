# Phase 6 namespace on the MANAGER cluster.
#
# The kueue-managed label is required so that Kueue's namespace selector
# matches this namespace and processes Workloads created here.
apiVersion: v1
kind: Namespace
metadata:
  name: checkpoint-dev
  labels:
    checkpoint-native.dev/enabled: "true"
    checkpoint-native.dev/phase: "phase6"
    checkpoint-native.dev/kueue-managed: "true"
    checkpoint-native.dev/role: "manager"
