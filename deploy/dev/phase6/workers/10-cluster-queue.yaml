# Phase 6 ClusterQueue on WORKER clusters.
#
# This is where real resource quotas are enforced. Worker clusters
# run the actual training workloads.
#
# Quota is intentionally small (500m CPU / 512Mi) so that the dev
# environment can demonstrate preemption with minimal resources.
#
# Preemption: withinClusterQueue LowerPriority (same as Phase 5).
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: phase6-worker-cq
  labels:
    checkpoint-native.dev/profile: phase6-worker
spec:
  namespaceSelector:
    matchLabels:
      checkpoint-native.dev/kueue-managed: "true"
  resourceGroups:
    - coveredResources:
        - cpu
        - memory
      flavors:
        - name: default-flavor
          resources:
            - name: cpu
              nominalQuota: 500m
            - name: memory
              nominalQuota: 512Mi
  preemption:
    withinClusterQueue: LowerPriority
    reclaimWithinCohort: Never
    borrowWithinCohort:
      maxPriorityThreshold: 0
