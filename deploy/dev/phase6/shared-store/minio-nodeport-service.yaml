# Phase 6 MinIO NodePort Service.
#
# Exposes MinIO on a fixed NodePort (30900) so that other kind clusters
# can reach it via the Docker-internal IP of the worker-1 control-plane
# container. This makes the checkpoint store accessible cross-cluster.
#
# Endpoint pattern: http://<worker-1-container-ip>:30900
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: checkpoint-dev
  labels:
    app.kubernetes.io/name: minio
    checkpoint-native.dev/profile: phase6-shared-store
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
      nodePort: 30900
    - name: console
      port: 9001
      targetPort: console
      nodePort: 30901
