# Phase 6 shared checkpoint store credentials template.
#
# This Secret is distributed to all clusters by install-phase6-shared-store.sh.
# The actual endpoint is resolved at install time (Docker-internal IP of
# worker-1 + NodePort 30900).
#
# Placeholders:
#   __SHARED_ENDPOINT__ -> resolved endpoint (e.g., http://172.18.0.3:30900)
#   __MINIO_USER__      -> MinIO root user
#   __MINIO_PASSWORD__  -> MinIO root password
#   __MINIO_REGION__    -> MinIO region
#   __MINIO_BUCKET__    -> checkpoint bucket name
apiVersion: v1
kind: Secret
metadata:
  name: checkpoint-storage-credentials
  namespace: checkpoint-dev
  labels:
    checkpoint-native.dev/profile: phase6-shared-store
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: __MINIO_USER__
  AWS_SECRET_ACCESS_KEY: __MINIO_PASSWORD__
  AWS_ENDPOINT_URL: __SHARED_ENDPOINT__
  AWS_REGION: __MINIO_REGION__
  AWS_S3_FORCE_PATH_STYLE: "true"
  CHECKPOINT_BUCKET: __MINIO_BUCKET__
