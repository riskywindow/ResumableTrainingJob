# Sample RTJ for Phase 7: provisioning failure.
#
# This RTJ targets a separate ClusterQueue that uses the dev-provisioning-failure
# AdmissionCheck (failed.fake.dev class). The fake backend immediately rejects
# the ProvisioningRequest.
#
# To use this sample, first create the failure queue:
#   kubectl apply -f deploy/dev/phase7/samples/failure-queue.yaml
#
# Expected flow:
#   1. RTJ submitted → Kueue creates Workload
#   2. Kueue reserves quota → creates ProvisioningRequest
#   3. Fake backend immediately sets Failed=True
#   4. Kueue sees PR failed → sets AdmissionCheck Rejected
#   5. Workload is not admitted → RTJ stays suspended
apiVersion: training.checkpoint.example.io/v1alpha1
kind: ResumableTrainingJob
metadata:
  name: __RTJ_NAME__
  namespace: __DEV_NAMESPACE__
  labels:
    kueue.x-k8s.io/queue-name: phase7-failure-training
spec:
  suspend: true
  queueName: phase7-failure-training
  control:
    desiredState: Running
  identity:
    worldSize: 2
    image: __TRAINER_IMAGE__
    codeVersion: "1"
    gpuShape: cpu-only
  runtime:
    mode: DDP
    optimizerMode: sgd
    shardingMode: none
    template:
      spec:
        replicatedJobs:
          - name: worker
            replicas: 2
            template:
              spec:
                parallelism: 1
                completions: 1
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: trainer
                        image: __TRAINER_IMAGE__
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
                        env:
                          - name: YIELD_SDK_STORAGE_URI
                            value: s3://rtj-checkpoints
                          - name: YIELD_SDK_CONTROL_FILE
                            value: /yield/control/state
                          - name: SLEEP_PER_STEP
                            value: "5"
                          - name: TOTAL_STEPS
                            value: "100"
                        volumeMounts:
                          - name: control
                            mountPath: /yield/control
                    volumes:
                      - name: control
                        emptyDir: {}
  checkpoint:
    storageURI: s3://rtj-checkpoints
    interval: 15s
    freshnessBudget: 1m
    maxDrainTime: 30s
  resume:
    sourcePolicy: LatestCompatibleComplete
    maxResumeRetries: 3
