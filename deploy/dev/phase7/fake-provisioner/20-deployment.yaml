apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-provisioner
  namespace: checkpoint-dev
  labels:
    app.kubernetes.io/name: fake-provisioner
    checkpoint-native.dev/profile: phase7-provisioning
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fake-provisioner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fake-provisioner
    spec:
      serviceAccountName: fake-provisioner
      containers:
        - name: fake-provisioner
          image: fake-provisioner:dev
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:9090
            - --health-probe-bind-address=:9091
          ports:
            - containerPort: 9090
              name: metrics
            - containerPort: 9091
              name: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
