# Phase 9 sample: Non-elastic fallback (Phase 8 behavior).
#
# This RTJ has no elasticity section — it runs as a fixed-size workload.
# It demonstrates that Phase 9 infrastructure is backward compatible:
#   - No spec.elasticity → elasticity disabled
#   - No reclaimablePods published
#   - No resize conditions on the RTJ
#   - Standard pause/resume/preemption behavior unchanged
#
# This sample consumes 2 workers (500m CPU). On the Phase 9 queue
# (1250m total), it coexists with one other 2-worker RTJ.
apiVersion: training.checkpoint.example.io/v1alpha1
kind: ResumableTrainingJob
metadata:
  name: __RTJ_NAME__
  namespace: __DEV_NAMESPACE__
  labels:
    kueue.x-k8s.io/queue-name: phase9-training
spec:
  suspend: true
  queueName: phase9-training
  identity:
    worldSize: 2
    image: __TRAINER_IMAGE__
    codeVersion: "1"
    gpuShape: virtual-gpu-v1
  runtime:
    mode: DDP
    optimizerMode: sgd
    shardingMode: none
    template:
      spec:
        replicatedJobs:
          - name: worker
            replicas: 2
            template:
              spec:
                parallelism: 1
                completions: 1
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: trainer
                        image: __TRAINER_IMAGE__
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
                        env:
                          - name: YIELD_SDK_STORAGE_URI
                            value: s3://rtj-checkpoints
                          - name: YIELD_SDK_CONTROL_FILE
                            value: /yield/control/state
                          - name: AWS_ACCESS_KEY_ID
                            value: minioadmin
                          - name: AWS_SECRET_ACCESS_KEY
                            value: minioadmin123
                          - name: AWS_ENDPOINT_URL
                            value: http://minio.checkpoint-dev.svc.cluster.local:9000
                          - name: AWS_DEFAULT_REGION
                            value: us-east-1
                          - name: SLEEP_PER_STEP
                            value: "2"
                          - name: CHECKPOINT_EVERY
                            value: "3"
                          - name: TOTAL_STEPS
                            value: "100"
                        volumeMounts:
                          - name: control
                            mountPath: /yield/control
                    volumes:
                      - name: control
                        emptyDir: {}
  checkpoint:
    storageURI: s3://rtj-checkpoints
    interval: 15s
    freshnessBudget: 1m
    maxDrainTime: 30s
  resume:
    sourcePolicy: LatestCompatibleComplete
    maxResumeRetries: 3
