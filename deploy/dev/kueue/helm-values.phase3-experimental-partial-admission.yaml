# Phase 3 Experimental Profile: Helm values for Kueue with partial admission
#
# Usage:
#   helm install kueue kueue/kueue \
#     --namespace kueue-system \
#     --create-namespace \
#     -f helm-values.phase3-experimental-partial-admission.yaml
#
# The PartialAdmission feature gate is Beta and default-on in Kueue v0.15.1.
# No explicit feature-gates flag is needed unless it has been disabled.
#
# If you need to explicitly enable it (e.g., if someone disabled it):
#   controllerManager:
#     manager:
#       args:
#         - --feature-gates=PartialAdmission=true
#
controllerManager:
  config:
    health:
      healthProbeBindAddress: :8081
    metrics:
      bindAddress: :8443
      enableClusterQueueResources: true
    webhook:
      port: 9443
    leaderElection:
      leaderElect: true
      resourceName: c1f6bfd2.kueue.x-k8s.io
    controller:
      groupKindConcurrency:
        Job.batch: 5
        Pod: 5
        Workload.kueue.x-k8s.io: 5
        LocalQueue.kueue.x-k8s.io: 1
        ClusterQueue.kueue.x-k8s.io: 1
        ResourceFlavor.kueue.x-k8s.io: 1
    clientConnection:
      qps: 50
      burst: 100
    manageJobsWithoutQueueName: false
    managedJobsNamespaceSelector:
      matchLabels:
        checkpoint-native.dev/kueue-managed: "true"
    integrations:
      frameworks:
        - batch/job
        - kubeflow.org/mpijob
        - ray.io/rayjob
        - ray.io/raycluster
        - jobset.x-k8s.io/jobset
        - kubeflow.org/paddlejob
        - kubeflow.org/pytorchjob
        - kubeflow.org/tfjob
        - kubeflow.org/xgboostjob
        - kubeflow.org/jaxjob
        - trainer.kubeflow.org/trainjob
        - workload.codeflare.dev/appwrapper
      externalFrameworks:
        - ResumableTrainingJob.v1alpha1.training.checkpoint.example.io
