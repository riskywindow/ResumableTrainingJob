# Example: ClusterQueue with namespaceSelector restricting which namespaces may
# submit Workloads.  Only namespaces labeled rtj.checkpoint.example.io/managed: "true"
# are eligible.  This ensures that unmanaged/dev namespaces cannot consume
# production quota.
#
# NOTE: This is an example.  Adjust resourceGroups, flavors, and quotas to match
# your cluster's capacity plan.
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: training-cluster-queue
spec:
  namespaceSelector:
    matchLabels:
      rtj.checkpoint.example.io/managed: "true"
  queueingStrategy: BestEffortFIFO
  resourceGroups:
    - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
      flavors:
        - name: default
          resources:
            - name: cpu
              nominalQuota: "1000"
            - name: memory
              nominalQuota: "4Ti"
            - name: "nvidia.com/gpu"
              nominalQuota: "64"
---
# Example: LocalQueue that maps into the ClusterQueue above.
# One per managed namespace.
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: training-queue
  namespace: training-prod
spec:
  clusterQueue: training-cluster-queue
